<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lollipop Care Assistant</title>
<link rel="stylesheet" href="_ds/lollipop-design-system-679df722-fc80-41a0-b664-2c92ff44d874/styles.css">
<script src="icons.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--cream); font-family: var(--font-brand); margin: 0; color: var(--ink-800); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .spectrum { height: 8px; flex: none; background: linear-gradient(90deg, var(--mood-terrible) 0 20%, var(--mood-bad) 20% 40%, var(--mood-okay) 40% 60%, var(--mood-good) 60% 80%, var(--mood-great) 80% 100%); }

  /* ---- Header ---- */
  header { flex: none; background: rgba(251,248,243,0.86); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line-200); }
  .hbar { max-width: 860px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
  .hbar .mark { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex: none; }
  .hbar .mark img { width: 40px; height: 40px; }
  .hbar .htext { flex: 1; min-width: 0; }
  .hbar .htext h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; color: var(--ink-900); margin: 0; }
  .hbar .htext p { font-size: 12.5px; font-weight: 600; color: var(--ink-400); margin: 1px 0 0; display: flex; align-items: center; gap: 6px; }
  .hbar .htext .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--positive); display: inline-block; }
  .hbar a.back { flex: none; font-size: 13px; font-weight: 700; color: var(--ink-500); text-decoration: none; border: 1px solid var(--line-300); border-radius: 999px; padding: 8px 15px; display: inline-flex; align-items: center; gap: 6px; transition: background 140ms, color 140ms; }
  .hbar a.back:hover { background: var(--fill-100); color: var(--ink-900); }
  .hbar a.back .ic-svg { width: 15px; height: 15px; }
  .hbar button.reset { flex: none; background: none; border: 1px solid var(--line-300); border-radius: 999px; width: 36px; height: 36px; cursor: pointer; color: var(--ink-400); display: flex; align-items: center; justify-content: center; transition: background 140ms, color 140ms; }
  .hbar button.reset:hover { background: var(--fill-100); color: var(--coral-500); }
  .hbar button.reset .ic-svg { width: 16px; height: 16px; }

  /* ---- Thread ---- */
  .thread-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  .thread { max-width: 860px; margin: 0 auto; padding: 26px 24px 8px; }

  .msg { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-start; }
  .msg .av { width: 34px; height: 34px; border-radius: 10px; flex: none; display: flex; align-items: center; justify-content: center; }
  .msg .av img { width: 34px; height: 34px; }
  .msg.bot .av { background: var(--blue-50); }
  .msg .bubble { border-radius: 16px; padding: 14px 17px; font-size: 15.5px; line-height: 1.6; max-width: 78%; }
  .msg.bot .bubble { background: var(--paper); border: 1px solid var(--line-300); border-top-left-radius: 5px; box-shadow: var(--shadow-sm); color: var(--ink-800); }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .av { background: var(--coral-100); }
  .msg.user .av .ic-svg { width: 18px; height: 18px; color: var(--coral-600); }
  .msg.user .bubble { background: var(--blue-500); color: #fff; border-top-right-radius: 5px; box-shadow: var(--shadow-brand); }

  .bubble p { margin: 0 0 9px; }
  .bubble p.mh { font-weight: 700; color: var(--ink-900); margin: 13px 0 6px; font-size: 15px; }
  .bubble p.mh:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 700; color: inherit; }
  .msg.bot .bubble strong { color: var(--ink-900); }
  .bubble ul, .bubble ol { margin: 6px 0 10px; padding-left: 20px; }
  .bubble li { margin-bottom: 5px; }
  .bubble a.inline { color: var(--blue-600); font-weight: 600; }

  /* tool link cards inside a bot message */
  .tools { display: flex; flex-direction: column; gap: 9px; margin-top: 13px; }
  .toolcard { display: flex; align-items: center; gap: 12px; text-decoration: none; background: var(--paper); border: 1px solid var(--line-300); border-radius: 14px; padding: 11px 13px; transition: transform 140ms var(--ease-out), box-shadow 140ms, border-color 140ms; }
  .toolcard:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--blue-200); }
  .toolcard .tic { width: 38px; height: 38px; border-radius: 10px; flex: none; display: flex; align-items: center; justify-content: center; color: #fff; }
  .toolcard .tic .ic-svg { width: 19px; height: 19px; }
  .toolcard .tb { flex: 1; min-width: 0; }
  .toolcard .tb b { display: block; font-size: 14.5px; font-weight: 700; color: var(--ink-900); }
  .toolcard .tb span { font-size: 12.5px; color: var(--ink-500); }
  .toolcard .go { flex: none; color: var(--ink-300); display: flex; }
  .toolcard .go .ic-svg { width: 17px; height: 17px; }
  .toolcard:hover .go { color: var(--blue-500); }

  /* crisis escalation card */
  .crisis { border: 1.5px solid var(--coral-500); background: var(--critical-soft); border-radius: 16px; padding: 15px 17px; margin-top: 13px; }
  .crisis h4 { display: flex; align-items: center; gap: 8px; font-size: 14.5px; font-weight: 800; color: var(--coral-600); margin: 0 0 7px; }
  .crisis h4 .ic-svg { width: 18px; height: 18px; }
  .crisis p { font-size: 13.5px; line-height: 1.55; color: var(--ink-700); margin: 0 0 6px; }
  .crisis p:last-child { margin-bottom: 0; }
  .crisis b { color: var(--ink-900); }

  /* typing */
  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-300); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.16s; }
  .typing span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* suggested prompts */
  .suggest { display: flex; flex-wrap: wrap; gap: 9px; margin: 2px 0 4px 46px; }
  .chip { font-size: 13.5px; font-weight: 600; color: var(--ink-700); background: var(--paper); border: 1px solid var(--line-300); border-radius: 999px; padding: 9px 15px; cursor: pointer; transition: background 140ms, border-color 140ms, transform 120ms; text-align: left; }
  .chip:hover { background: var(--blue-50); border-color: var(--blue-200); color: var(--blue-700); }
  .chip:active { transform: scale(0.97); }

  /* ---- Composer ---- */
  .composer-wrap { flex: none; background: rgba(251,248,243,0.92); backdrop-filter: blur(12px); border-top: 1px solid var(--line-200); }
  .composer { max-width: 860px; margin: 0 auto; padding: 14px 24px 10px; }
  .inputrow { display: flex; align-items: flex-end; gap: 10px; background: var(--paper); border: 1.5px solid var(--line-300); border-radius: 24px; padding: 7px 7px 7px 18px; transition: border-color 160ms, box-shadow 160ms; }
  .inputrow:focus-within { border-color: var(--coral-500); box-shadow: 0 0 0 4px var(--critical-soft); }
  .inputrow textarea { flex: 1; border: none; outline: none; resize: none; background: none; font-family: var(--font-brand); font-size: 15.5px; line-height: 1.5; color: var(--ink-900); padding: 8px 0; max-height: 140px; }
  .inputrow textarea::placeholder { color: var(--ink-300); }
  .send { flex: none; width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--blue-500); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 140ms, transform 120ms; box-shadow: var(--shadow-brand); }
  .send:hover:not(:disabled) { background: var(--blue-600); }
  .send:active:not(:disabled) { transform: scale(0.92); }
  .send:disabled { background: var(--ink-200); box-shadow: none; cursor: default; }
  .send .ic-svg { width: 19px; height: 19px; }
  .disclaim { text-align: center; font-size: 11.5px; color: var(--ink-400); margin: 9px 0 0; line-height: 1.45; }
  .disclaim b { color: var(--coral-600); font-weight: 700; }

  @media (max-width: 600px) {
    .msg .bubble { max-width: 86%; }
    .suggest { margin-left: 0; }
    .hbar a.back span { display: none; }
  }
</style>
</head>
<body>
<div class="spectrum"></div>

<header>
  <div class="hbar">
    <div class="mark"><img src="assets/logos/lollipop-mark.png" alt="Lollipop"></div>
    <div class="htext">
      <h1>Care Assistant</h1>
      <p><span class="dot"></span>Onboarding, the dashboard &amp; supporting your team</p>
    </div>
    <a class="back" href="index.html"><iconify-icon icon="lucide:arrow-left"></iconify-icon><span>Portal</span></a>
    <button class="reset" id="reset" title="Start a new conversation"><iconify-icon icon="lucide:rotate-ccw"></iconify-icon></button>
  </div>
</header>

<div class="thread-wrap" id="threadWrap">
  <div class="thread" id="thread"></div>
</div>

<div class="composer-wrap">
  <div class="composer">
    <div class="inputrow">
      <textarea id="input" rows="1" placeholder="Ask about getting set up, the admin dashboard, rosters, or responding to an alert…"></textarea>
      <button class="send" id="send" disabled><iconify-icon icon="lucide:arrow-up"></iconify-icon></button>
    </div>
    <p class="disclaim">Lollipop's Care Assistant offers guidance and resources — it is <b>not a counselor or therapist</b>. If anyone may be at risk of harm, contact HR immediately and call 988 (US) or local emergency services.</p>
  </div>
</div>

<script src="care-assistant.js"></script>
</body>
</html>
